<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D 파쿠우우우르</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #05060a; font-family: "Malgun Gothic", sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 16px;
    left: 16px;
    color: #e8f0ff;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    font-size: 14px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 5;
  }
  #hud h1 {
    font-size: 20px;
    margin: 0 0 6px 0;
    letter-spacing: 1px;
    color: #9fd8ff;
  }
  #checkpointMsg {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffe89f;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 6;
  }
  #blocker {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    color: #fff;
    text-align: center;
    cursor: pointer;
  }
  #blocker .panel {
    max-width: 480px;
    padding: 24px 32px;
    background: rgba(10, 14, 24, 0.85);
    border: 1px solid #3a5a7a;
    border-radius: 8px;
  }
  #blocker h2 { color: #9fd8ff; margin-top: 0; }
  #blocker p { font-size: 14px; line-height: 1.6; color: #cfe; }
  #lightningFlash {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #eaf3ff;
    opacity: 0;
    pointer-events: none;
    z-index: 7;
  }
  #fallMsg {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8f8f;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 6;
    text-shadow: 0 0 8px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>

<div id="hud">
  <h1>3D 파쿠우우우르</h1>
  <div>WASD / 방향키 : 이동 &nbsp; / &nbsp; SPACE : 점프(2단 가능) &nbsp; / &nbsp; 마우스 : 시야</div>
  <div id="checkpointCount">체크포인트: 0 / 0</div>
</div>

<div id="lightningFlash"></div>
<div id="checkpointMsg">체크포인트 통과!</div>
<div id="fallMsg">추락... 마지막 체크포인트에서 다시 시작합니다</div>

<div id="blocker">
  <div class="panel">
    <h2>3D 파쿠우우우르</h2>
    <p>
      비 내리는 도시 위, 둥둥 떠 있는 사각 플랫폼을 밟고 건너가는 여가용 파쿠르 게임입니다.<br><br>
      WASD로 이동, SPACE로 점프, 마우스로 시야를 조작하세요.<br>
      플랫폼에서 떨어지면 마지막 체크포인트에서 다시 시작합니다.<br><br>
      <b>클릭하여 시작</b>
    </p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

// -----------------------------------------------------------------------
// 기본 씬 / 카메라 / 렌더러
// -----------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0d14);
scene.fog = new THREE.FogExp2(0x0a0d14, 0.007);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 600);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// -----------------------------------------------------------------------
// 조명 - 비 내리는 도시 야경 느낌
// -----------------------------------------------------------------------
const hemi = new THREE.HemisphereLight(0x6f93b8, 0x10131a, 1.2);
scene.add(hemi);

const moon = new THREE.DirectionalLight(0xaecbff, 1.3);
moon.position.set(-40, 60, -30);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.near = 1;
moon.shadow.camera.far = 200;
moon.shadow.camera.left = -80;
moon.shadow.camera.right = 80;
moon.shadow.camera.top = 80;
moon.shadow.camera.bottom = -80;
scene.add(moon);

const fillLight = new THREE.PointLight(0xff9a5a, 0.9, 90);
fillLight.position.set(10, 12, 10);
scene.add(fillLight);

// -----------------------------------------------------------------------
// 도시 배경: 안개 속 건물 실루엣
// -----------------------------------------------------------------------
const cityGroup = new THREE.Group();
const buildingMat = new THREE.MeshStandardMaterial({ color: 0x12161f, roughness: 0.9, metalness: 0.1 });
const windowMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffaa44, emissiveIntensity: 1.2, roughness: 0.4 });
const buildingBoxes = []; // { mesh, box3 } - 건물도 충돌 처리 대상이 되도록 따로 수집

function makeBuilding(x, z, w, h, d) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, buildingMat);
  mesh.position.set(x, h / 2, z);
  mesh.receiveShadow = true;
  cityGroup.add(mesh);
  mesh.updateMatrixWorld(true);
  buildingBoxes.push({ mesh, box3: new THREE.Box3().setFromObject(mesh) });

  // 창문 점들 (간단한 emissive 패널)
  const winCount = Math.floor(h / 6);
  for (let i = 0; i < winCount; i++) {
    if (Math.random() > 0.55) continue;
    const win = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.6, 1.2), windowMat);
    win.position.set(x, 3 + i * 6, z + d / 2 + 0.05);
    cityGroup.add(win);
  }
}

const rand = (a, b) => a + Math.random() * (b - a);
for (let i = 0; i < 50; i++) {
  const angle = Math.random() * Math.PI * 2;
  const radius = rand(45, 160);
  const x = Math.cos(angle) * radius;
  const z = Math.sin(angle) * radius;
  makeBuilding(x, z, rand(8, 18), rand(20, 90), rand(8, 18));
}
scene.add(cityGroup);

// 바닥: 비에 젖어 반사되는 듯한 어두운 도시 거리
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x05070b, roughness: 0.25, metalness: 0.6 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -60;
ground.receiveShadow = true;
scene.add(ground);

// -----------------------------------------------------------------------
// 비 내리는 효과 (파티클)
// -----------------------------------------------------------------------
const RAIN_COUNT = 4000;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(RAIN_COUNT * 3);
const rainVel = new Float32Array(RAIN_COUNT);
for (let i = 0; i < RAIN_COUNT; i++) {
  rainPos[i * 3 + 0] = rand(-80, 80);
  rainPos[i * 3 + 1] = rand(0, 100);
  rainPos[i * 3 + 2] = rand(-80, 80);
  rainVel[i] = rand(40, 70);
}
rainGeo.setAttribute("position", new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({
  color: 0xbcd4ff,
  size: 0.18,
  transparent: true,
  opacity: 0.55,
});
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

function updateRain(dt, centerX, centerZ) {
  const pos = rainGeo.attributes.position.array;
  for (let i = 0; i < RAIN_COUNT; i++) {
    pos[i * 3 + 1] -= rainVel[i] * dt;
    if (pos[i * 3 + 1] < -5) {
      pos[i * 3 + 1] = rand(60, 100);
      pos[i * 3 + 0] = centerX + rand(-80, 80);
      pos[i * 3 + 2] = centerZ + rand(-80, 80);
    }
  }
  rainGeo.attributes.position.needsUpdate = true;
}

// -----------------------------------------------------------------------
// 천둥 / 번개
// -----------------------------------------------------------------------
const lightningFlash = document.getElementById("lightningFlash");
const moonBaseIntensity = moon.intensity;
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playThunder(volume) {
  if (!audioCtx) return;
  const duration = 2.2;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.5);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const lowpass = audioCtx.createBiquadFilter();
  lowpass.type = "lowpass";
  lowpass.frequency.setValueAtTime(900, audioCtx.currentTime);
  lowpass.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + duration);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  noise.connect(lowpass);
  lowpass.connect(gain);
  gain.connect(audioCtx.destination);

  noise.start();
  noise.stop(audioCtx.currentTime + duration);
}

function flashLightning(intensity) {
  lightningFlash.style.transition = "opacity 0.05s ease-out";
  lightningFlash.style.opacity = String(intensity);
  moon.intensity = moonBaseIntensity + intensity * 6;
  setTimeout(() => {
    lightningFlash.style.transition = "opacity 0.25s ease-in";
    lightningFlash.style.opacity = "0";
    moon.intensity = moonBaseIntensity;
  }, 70);
}

function triggerLightning() {
  // 두 번 깜빡이는 번개 (가까운 정도에 따라 강도가 달라짐)
  const closeness = rand(0.4, 1.0); // 1에 가까울수록 가깝고 강한 번개
  flashLightning(0.5 + closeness * 0.5);
  setTimeout(() => flashLightning(0.3 + closeness * 0.3), rand(80, 160));

  // 빛은 즉시 보이지만 소리는 거리에 따라 늦게 도착
  const soundDelay = (1 - closeness) * 2200 + rand(100, 300);
  setTimeout(() => playThunder(0.5 + closeness * 0.5), soundDelay);
}

function scheduleNextLightning() {
  const delay = rand(6000, 16000);
  setTimeout(() => {
    triggerLightning();
    scheduleNextLightning();
  }, delay);
}
scheduleNextLightning();

// -----------------------------------------------------------------------
// 플랫폼: 떠 있는 사각 블록들로 파쿠르 코스 구성
// -----------------------------------------------------------------------
const platforms = []; // { mesh, box3 }
platforms.push(...buildingBoxes); // 건물도 충돌 처리되어 통과되지 않도록 합류

const platformMat = new THREE.MeshStandardMaterial({ color: 0x7d92a8, roughness: 0.45, metalness: 0.25, emissive: 0x1c2a38, emissiveIntensity: 0.4 });
const platformEdgeMat = new THREE.MeshStandardMaterial({ color: 0x9fe8ff, emissive: 0x2a9fd6, emissiveIntensity: 0.9, roughness: 0.4 });
const edgeLineMat = new THREE.LineBasicMaterial({ color: 0x9fe8ff });

// 스테이지2(용암지대)용 빨간 플랫폼 재질
const platformMatLava = new THREE.MeshStandardMaterial({ color: 0x8a2418, roughness: 0.5, metalness: 0.2, emissive: 0xff3300, emissiveIntensity: 0.55 });
const platformEdgeMatLava = new THREE.MeshStandardMaterial({ color: 0xffae42, emissive: 0xff6a00, emissiveIntensity: 1.1, roughness: 0.4 });
const edgeLineMatLava = new THREE.LineBasicMaterial({ color: 0xffae42 });

// 스테이지3(구름 위 하늘길)용 보라/하늘색 플랫폼 재질
const platformMatSky = new THREE.MeshStandardMaterial({ color: 0x4a3f8a, roughness: 0.4, metalness: 0.3, emissive: 0x6a4fff, emissiveIntensity: 0.5 });
const platformEdgeMatSky = new THREE.MeshStandardMaterial({ color: 0xbfa9ff, emissive: 0x9a6aff, emissiveIntensity: 1.1, roughness: 0.35 });
const edgeLineMatSky = new THREE.LineBasicMaterial({ color: 0xbfa9ff });

const THEME_MATS = {
  normal: { base: platformMat, edge: platformEdgeMat, line: edgeLineMat },
  lava: { base: platformMatLava, edge: platformEdgeMatLava, line: edgeLineMatLava },
  sky: { base: platformMatSky, edge: platformEdgeMatSky, line: edgeLineMatSky },
};

function addPlatform(x, y, z, w = 6, h = 1, d = 6, glow = false, theme = "normal") {
  const themeMat = THEME_MATS[theme] || THEME_MATS.normal;
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = glow ? themeMat.edge : themeMat.base;
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // 테두리를 밝게 그려서 어두운 배경에서도 플랫폼 윤곽이 잘 보이게 함
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), themeMat.line);
  mesh.add(edges);

  const box3 = new THREE.Box3().setFromObject(mesh);
  platforms.push({ mesh, box3 });
  return mesh;
}

// 코스 경로 정의 (시작 -> 체크포인트들 -> 도착)
const coursePoints = [
  { x: 0,  y: 0,  z: 0,  w: 10, d: 10 }, // 시작 플랫폼
  { x: 0,  y: 1,  z: -14, w: 6, d: 6 },
  { x: 7,  y: 2.5, z: -24, w: 5, d: 5 },
  { x: 2,  y: 4.5, z: -34, w: 5, d: 5, checkpoint: true },
  { x: -7, y: 6,  z: -42, w: 5, d: 5 },
  { x: -9, y: 7.2, z: -48, w: 4, d: 4 },
  { x: -10, y: 8.5, z: -54, w: 5, d: 5 },
  { x: -2, y: 10.5, z: -64, w: 5, d: 5, checkpoint: true },
  { x: 8,  y: 12.5, z: -72, w: 5, d: 5 },
  { x: 16, y: 14.5, z: -80, w: 5, d: 5 },
  { x: 18, y: 17,  z: -92, w: 5, d: 5, checkpoint: true },
  { x: 10, y: 19,  z: -102, w: 5, d: 5 },
  { x: 0,  y: 21,  z: -110, w: 5, d: 5 },
  { x: -8, y: 23.5, z: -118, w: 6, d: 6, checkpoint: true },
  { x: -8, y: 25,  z: -130, w: 12, d: 12, stage1Clear: true },
];

// 스테이지2: 용암지대 - 빨간 플랫폼, 내려갔다가 다시 올라가 탈출하는 코스
const coursePoints2 = [
  { x: -8, y: 25,  z: -145, w: 6, d: 6 },
  { x: 2,  y: 23,  z: -156, w: 5, d: 5 },
  { x: 10, y: 21,  z: -166, w: 5, d: 5, checkpoint: true },
  { x: 6,  y: 19,  z: -178, w: 5, d: 5 },
  { x: -4, y: 18,  z: -188, w: 5, d: 5 },
  { x: -12, y: 17, z: -198, w: 5, d: 5, checkpoint: true },
  { x: -6, y: 16,  z: -210, w: 5, d: 5 },
  { x: 4,  y: 15,  z: -220, w: 5, d: 5 },
  { x: 12, y: 15,  z: -232, w: 5, d: 5, checkpoint: true },
  { x: 6,  y: 16,  z: -244, w: 5, d: 5 },
  { x: -4, y: 18,  z: -254, w: 6, d: 6 },
  { x: -4, y: 20,  z: -266, w: 14, d: 14, stage2Clear: true },
];

// 스테이지3: 구름 위 하늘길 - 보라색 플랫폼, 점점 높이 올라가며 정상에서 완주
const coursePoints3 = [
  { x: 4,  y: 22, z: -278, w: 5, d: 5 },
  { x: 12, y: 24, z: -288, w: 5, d: 5, checkpoint: true },
  { x: 6,  y: 27, z: -298, w: 5, d: 5 },
  { x: -4, y: 30, z: -308, w: 5, d: 5 },
  { x: -14, y: 33, z: -318, w: 5, d: 5, checkpoint: true },
  { x: -6, y: 36, z: -328, w: 5, d: 5 },
  { x: 4,  y: 39, z: -338, w: 5, d: 5 },
  { x: 0,  y: 42, z: -350, w: 6, d: 6, checkpoint: true },
  { x: 0,  y: 44, z: -362, w: 14, d: 14, goal: true },
];

const checkpoints = []; // { mesh, position, reached }
let goalPosition = null;
let stage1ClearPosition = null;
let stage1ClearShown = false;
let stage2ClearPosition = null;
let stage2ClearShown = false;

function buildCourse(points, theme) {
  points.forEach((p) => {
    addPlatform(p.x, p.y, p.z, p.w, 1, p.d, !!(p.checkpoint || p.goal || p.stage1Clear || p.stage2Clear), theme);
    if (p.checkpoint) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(2, 0.18, 12, 32),
        new THREE.MeshStandardMaterial({ color: 0xffd27a, emissive: 0xffae42, emissiveIntensity: 1.0 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.set(p.x, p.y + 2.2, p.z);
      scene.add(ring);
      checkpoints.push({
        mesh: ring,
        position: new THREE.Vector3(p.x, p.y + 1.5, p.z),
        reached: false,
      });
    }
    if (p.stage1Clear) {
      stage1ClearPosition = new THREE.Vector3(p.x, p.y + 1.5, p.z);
    }
    if (p.stage2Clear) {
      stage2ClearPosition = new THREE.Vector3(p.x, p.y + 1.5, p.z);
    }
    if (p.goal) {
      goalPosition = new THREE.Vector3(p.x, p.y + 1.5, p.z);
      const flag = new THREE.Mesh(
        new THREE.ConeGeometry(1.4, 3, 16),
        new THREE.MeshStandardMaterial({ color: 0x7affb0, emissive: 0x2bff8a, emissiveIntensity: 0.8 })
      );
      flag.position.set(p.x, p.y + 2.5, p.z);
      scene.add(flag);
    }
  });
}

buildCourse(coursePoints, "normal");
buildCourse(coursePoints2, "lava");
buildCourse(coursePoints3, "sky");

document.getElementById("checkpointCount").textContent = `체크포인트: 0 / ${checkpoints.length}`;

// 추가 장식용 작은 플랫폼들 (배경에 떠 있는 느낌 강화)
for (let i = 0; i < 25; i++) {
  const x = rand(-60, 60);
  const z = rand(-160, 30);
  const y = rand(-5, 30);
  if (Math.abs(x) < 20 && z > -135 && z < 10) continue; // 코스와 너무 겹치지 않게
  addPlatform(x, y, z, rand(3, 7), 1, rand(3, 7));
}

// 용암지대 장식용 작은 플랫폼들
for (let i = 0; i < 18; i++) {
  const x = rand(-50, 50);
  const z = rand(-273, -135);
  const y = rand(0, 28);
  if (Math.abs(x) < 18) continue; // 코스와 너무 겹치지 않게
  addPlatform(x, y, z, rand(3, 6), 1, rand(3, 6), false, "lava");
}

// 하늘길 장식용 작은 플랫폼들
for (let i = 0; i < 18; i++) {
  const x = rand(-50, 50);
  const z = rand(-362, -273);
  const y = rand(18, 48);
  if (Math.abs(x) < 18) continue; // 코스와 너무 겹치지 않게
  addPlatform(x, y, z, rand(3, 6), 1, rand(3, 6), false, "sky");
}

// -----------------------------------------------------------------------
// 용암 바닥 & 뜨거운 분위기
// -----------------------------------------------------------------------
const LAVA_ZONE_START_Z = -132; // 스테이지1 도착 플랫폼 바로 너머부터 용암지대
const LAVA_ZONE_END_Z = -273;
const LAVA_SURFACE_Y = 3;

const lavaGround = new THREE.Mesh(
  new THREE.PlaneGeometry(160, 145),
  new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff3300, emissiveIntensity: 1.3, roughness: 0.35 })
);
lavaGround.rotation.x = -Math.PI / 2;
lavaGround.position.set(-2, LAVA_SURFACE_Y, -202.5);
scene.add(lavaGround);

const lavaLight = new THREE.PointLight(0xff5522, 1.4, 140);
lavaLight.position.set(-2, LAVA_SURFACE_Y + 15, -202.5);
scene.add(lavaLight);

const COOL_BG = new THREE.Color(0x0a0d14);
const HOT_BG = new THREE.Color(0x3a0f05);
const COOL_FOG = new THREE.Color(0x0a0d14);
const HOT_FOG = new THREE.Color(0x2a0e06);
const COOL_HEMI = new THREE.Color(0x6f93b8);
const HOT_HEMI = new THREE.Color(0xff8a3d);
const COOL_MOON = new THREE.Color(0xaecbff);
const HOT_MOON = new THREE.Color(0xff7a3d);

function updateAtmosphere(playerZ) {
  const enter = THREE.MathUtils.clamp((LAVA_ZONE_START_Z - playerZ) / 40, 0, 1);
  const exit = THREE.MathUtils.clamp(1 - (LAVA_ZONE_END_Z - playerZ) / 40, 0, 1);
  const hotFactor = enter * exit;
  scene.background.copy(COOL_BG).lerp(HOT_BG, hotFactor);
  scene.fog.color.copy(COOL_FOG).lerp(HOT_FOG, hotFactor);
  scene.fog.density = 0.007 + hotFactor * 0.006;
  hemi.color.copy(COOL_HEMI).lerp(HOT_HEMI, hotFactor);
  moon.color.copy(COOL_MOON).lerp(HOT_MOON, hotFactor);
  lavaLight.intensity = 1.0 + hotFactor * 0.8 + Math.sin(performance.now() * 0.004) * 0.15;
  rainMat.opacity = 0.55 * (1 - hotFactor); // 용암지대에서는 비가 잦아듦
  return hotFactor;
}

// -----------------------------------------------------------------------
// 플레이어
// -----------------------------------------------------------------------
const PLAYER_RADIUS = 0.5;
const PLAYER_HEIGHT = 1.8;
const GRAVITY = -28;
const JUMP_VELOCITY = 10.5;
const MOVE_SPEED = 9;

const startPos = new THREE.Vector3(0, 1 + PLAYER_HEIGHT / 2, 0);
const MAX_JUMPS = 2;
const player = {
  position: startPos.clone(),
  velocity: new THREE.Vector3(0, 0, 0),
  onGround: false,
  jumpsUsed: 0,
  yaw: Math.PI, // 코스가 -z 방향으로 진행되므로 시작 시 그 방향을 보게 함
  pitch: 0,
};
let spaceWasDown = false;

let lastCheckpointPos = startPos.clone();

const playerMesh = new THREE.Mesh(
  new THREE.CapsuleGeometry(PLAYER_RADIUS, PLAYER_HEIGHT - PLAYER_RADIUS * 2, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0xff7a59, roughness: 0.5 })
);
playerMesh.castShadow = true;
playerMesh.visible = false; // 1인칭이므로 본인 모델은 숨김 (그림자만 캐스트)
scene.add(playerMesh);

// -----------------------------------------------------------------------
// 입력 처리
// -----------------------------------------------------------------------
const keys = {};
const navKeys = new Set(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"]);
window.addEventListener("keydown", (e) => {
  keys[e.code] = true;
  if (navKeys.has(e.code)) e.preventDefault();
});
window.addEventListener("keyup", (e) => (keys[e.code] = false));

const blocker = document.getElementById("blocker");
let pointerLocked = false;

blocker.addEventListener("click", () => {
  renderer.domElement.requestPointerLock();
  initAudio();
});

document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
  blocker.style.display = pointerLocked ? "none" : "flex";
});

document.addEventListener("mousemove", (e) => {
  if (!pointerLocked) return;
  const sensitivity = 0.0022;
  player.yaw -= e.movementX * sensitivity;
  player.pitch -= e.movementY * sensitivity;
  player.pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, player.pitch));
});

// -----------------------------------------------------------------------
// 충돌 / 물리
// -----------------------------------------------------------------------
function getPlayerBox(pos) {
  return new THREE.Box3(
    new THREE.Vector3(pos.x - PLAYER_RADIUS, pos.y - PLAYER_HEIGHT / 2, pos.z - PLAYER_RADIUS),
    new THREE.Vector3(pos.x + PLAYER_RADIUS, pos.y + PLAYER_HEIGHT / 2, pos.z + PLAYER_RADIUS)
  );
}

function resolveCollisions(nextPos, velocity) {
  let onGround = false;

  // Y축 먼저 처리 (수직 충돌)
  let testPos = nextPos.clone();
  let box = getPlayerBox(testPos);
  for (const p of platforms) {
    if (!box.intersectsBox(p.box3)) continue;
    const pb = p.box3;
    const overlapTop = testPos.y - PLAYER_HEIGHT / 2 - pb.max.y;
    const overlapBottom = pb.min.y - (testPos.y + PLAYER_HEIGHT / 2);
    if (velocity.y <= 0 && Math.abs(overlapTop) < 1.2 && testPos.y - PLAYER_HEIGHT/2 + velocity.y * 0.02 <= pb.max.y) {
      // 떨어지며 플랫폼 위에 착지
      testPos.y = pb.max.y + PLAYER_HEIGHT / 2;
      velocity.y = 0;
      onGround = true;
    } else if (velocity.y > 0 && Math.abs(overlapBottom) < 1.2) {
      // 점프 중 천장에 부딫힘
      testPos.y = pb.min.y - PLAYER_HEIGHT / 2;
      velocity.y = 0;
    }
  }

  // XZ축 처리 (수평 충돌) - 간단한 push-out 방식
  box = getPlayerBox(testPos);
  for (const p of platforms) {
    if (!box.intersectsBox(p.box3)) continue;
    const pb = p.box3;
    // 플레이어 발이 플랫폼 표면보다 충분히 위에 있으면(=올라타 있는 상태) 수평 충돌 무시
    if (testPos.y - PLAYER_HEIGHT / 2 >= pb.max.y - 0.05) continue;

    const dx1 = pb.max.x - (testPos.x - PLAYER_RADIUS);
    const dx2 = (testPos.x + PLAYER_RADIUS) - pb.min.x;
    const dz1 = pb.max.z - (testPos.z - PLAYER_RADIUS);
    const dz2 = (testPos.z + PLAYER_RADIUS) - pb.min.z;
    const minPush = Math.min(dx1, dx2, dz1, dz2);
    if (minPush === dx1) testPos.x += dx1;
    else if (minPush === dx2) testPos.x -= dx2;
    else if (minPush === dz1) testPos.z += dz1;
    else if (minPush === dz2) testPos.z -= dz2;
  }

  return { pos: testPos, onGround };
}

// -----------------------------------------------------------------------
// 체크포인트 / 추락 처리
// -----------------------------------------------------------------------
const checkpointMsg = document.getElementById("checkpointMsg");
const fallMsg = document.getElementById("fallMsg");
let msgTimer = 0;
let fallMsgTimer = 0;
let reachedCount = 0;
let gameWon = false;

function showMessage(el, timerSetter, text) {
  el.textContent = text ?? el.textContent;
  el.style.opacity = "1";
  timerSetter(1.6);
}

function checkCheckpoints() {
  for (const cp of checkpoints) {
    if (cp.reached) continue;
    if (player.position.distanceTo(cp.position) < 3.2) {
      cp.reached = true;
      reachedCount++;
      lastCheckpointPos = cp.position.clone();
      cp.mesh.material.color.set(0x6fffb0);
      cp.mesh.material.emissive.set(0x2bff8a);
      document.getElementById("checkpointCount").textContent = `체크포인트: ${reachedCount} / ${checkpoints.length}`;
      checkpointMsg.textContent = "체크포인트 통과!";
      checkpointMsg.style.opacity = "1";
      msgTimer = 1.6;
    }
  }
  if (!stage1ClearShown && stage1ClearPosition && player.position.distanceTo(stage1ClearPosition) < 4) {
    stage1ClearShown = true;
    lastCheckpointPos = stage1ClearPosition.clone();
    checkpointMsg.textContent = "스테이지 1 클리어! 용암지대 진입...";
    checkpointMsg.style.opacity = "1";
    msgTimer = 2.4;
  }
  if (!stage2ClearShown && stage2ClearPosition && player.position.distanceTo(stage2ClearPosition) < 4) {
    stage2ClearShown = true;
    lastCheckpointPos = stage2ClearPosition.clone();
    checkpointMsg.textContent = "스테이지 2 클리어! 구름 위 하늘길 진입...";
    checkpointMsg.style.opacity = "1";
    msgTimer = 2.4;
  }
  if (!gameWon && goalPosition && player.position.distanceTo(goalPosition) < 4) {
    gameWon = true;
    checkpointMsg.textContent = "도착! 파쿠르 완주 🎉";
    checkpointMsg.style.opacity = "1";
    msgTimer = 4;
  }
}

function checkFall() {
  const inLavaZone = player.position.z < LAVA_ZONE_START_Z && player.position.z > LAVA_ZONE_END_Z;
  const failY = inLavaZone ? LAVA_SURFACE_Y : -20;
  if (player.position.y < failY) {
    player.position.copy(lastCheckpointPos).add(new THREE.Vector3(0, 1, 0));
    player.velocity.set(0, 0, 0);
    player.jumpsUsed = 0;
    fallMsg.textContent = inLavaZone
      ? "용암에 빠졌다... 마지막 체크포인트에서 다시 시작합니다"
      : "추락... 마지막 체크포인트에서 다시 시작합니다";
    fallMsg.style.opacity = "1";
    fallMsgTimer = 1.8;
  }
}

// -----------------------------------------------------------------------
// 메인 루프
// -----------------------------------------------------------------------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (pointerLocked) {
    // 이동 입력 -> 카메라 yaw 기준 방향
    const forward = new THREE.Vector3(Math.sin(player.yaw), 0, Math.cos(player.yaw));
    const right = new THREE.Vector3(Math.sin(player.yaw + Math.PI / 2), 0, Math.cos(player.yaw + Math.PI / 2));

    const moveDir = new THREE.Vector3();
    if (keys["KeyW"] || keys["ArrowUp"]) moveDir.sub(forward);
    if (keys["KeyS"] || keys["ArrowDown"]) moveDir.add(forward);
    if (keys["KeyA"] || keys["ArrowLeft"]) moveDir.sub(right);
    if (keys["KeyD"] || keys["ArrowRight"]) moveDir.add(right);
    if (moveDir.lengthSq() > 0) moveDir.normalize().multiplyScalar(MOVE_SPEED);

    player.velocity.x = moveDir.x;
    player.velocity.z = moveDir.z;

    // 중력 / 점프 (2단 점프 지원)
    player.velocity.y += GRAVITY * dt;
    const spaceIsDown = !!keys["Space"];
    if (spaceIsDown && !spaceWasDown && player.jumpsUsed < MAX_JUMPS) {
      player.velocity.y = JUMP_VELOCITY;
      player.onGround = false;
      player.jumpsUsed++;
    }
    spaceWasDown = spaceIsDown;

    const nextPos = player.position.clone();
    nextPos.x += player.velocity.x * dt;
    nextPos.y += player.velocity.y * dt;
    nextPos.z += player.velocity.z * dt;

    const result = resolveCollisions(nextPos, player.velocity);
    player.position.copy(result.pos);
    player.onGround = result.onGround;
    if (player.onGround) player.jumpsUsed = 0;

    checkCheckpoints();
    checkFall();
  }

  // 카메라를 1인칭 시점으로 플레이어 위치에 배치
  camera.position.copy(player.position);
  camera.rotation.order = "YXZ";
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  playerMesh.position.copy(player.position);
  playerMesh.rotation.y = player.yaw;

  fillLight.position.set(player.position.x + 5, player.position.y + 10, player.position.z + 5);

  updateRain(dt, player.position.x, player.position.z);
  updateAtmosphere(player.position.z);

  // 메시지 페이드아웃 타이머
  if (msgTimer > 0) {
    msgTimer -= dt;
    if (msgTimer <= 0) checkpointMsg.style.opacity = "0";
  }
  if (fallMsgTimer > 0) {
    fallMsgTimer -= dt;
    if (fallMsgTimer <= 0) fallMsg.style.opacity = "0";
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
